name: Deploy to VPS

# Auto-deploy to the Google Cloud e2-micro VM on every push to main.
# Requires repo secret VPS_SSH_KEY (private key whose public half is in the
# VM's instance SSH metadata for user `pete`).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: worldcup.ota-i.com
          VPS_USER: pete
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -e
          cd ~/easygds_worldcup
          git fetch origin main
          BEFORE=$(git rev-parse HEAD)
          git reset --hard origin/main
          git diff --quiet "$BEFORE" HEAD -- package-lock.json || npm ci
          npm run build
          sudo systemctl restart worldcup
          sleep 3
          systemctl is-active worldcup
          REMOTE
